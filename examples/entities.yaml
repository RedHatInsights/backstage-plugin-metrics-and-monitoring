---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-system
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: examples
spec:
  owner: guests
---
# Test component that shows all Metrics and Monitoring plugin sections:
# Grafana (annotation), Prometheus, Kibana, Catchpoint (annotation), Firing Alerts table
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: metrics-monitoring-demo
  title: metrics-monitoring-demo
  description: Demo component to exercise every part of the Metrics and Monitoring plugin
  annotations:
    metrics-and-monitoring/grafana-dashboard-url: "https://grafana.example.com/d/my-dashboard?orgId=1"
    metrics-and-monitoring/catchpoint-test-id: "12345"
spec:
  type: website
  lifecycle: experimental
  owner: guests
  system: examples
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-website
spec:
  type: website
  lifecycle: experimental
  owner: guests
  system: examples
  providesApis: [example-grpc-api]
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: example-grpc-api
spec:
  type: grpc
  lifecycle: experimental
  owner: guests
  system: examples
  definition: |
    syntax = "proto3";

    service Exampler {
      rpc Example (ExampleMessage) returns (ExampleMessage) {};
    }

    message ExampleMessage {
      string example = 1;
    };
